<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 2 Year Anniversary</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-image: url('il_570xN.6744392683_8xrz.avif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Georgia', serif; 
            color: #0b4f6c; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; text-align: center; overflow: hidden;
        }

        .container { 
            z-index: 10; 
            padding: 30px; 
            background: rgba(255, 255, 255, 0.8); 
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 { font-size: 3rem; margin-bottom: 10px; color: #d63384; }

        .quote { 
            font-size: 1.5rem; 
            font-style: italic; 
            max-width: 500px; 
            margin: 0 auto; 
            line-height: 1.4;
        }

        /* Heart Shaped Button */
        .heart-btn {
            background-color: #d63384;
            display: inline-block;
            height: 90px;
            margin: 60px 10px 20px 10px;
            position: relative;
            transform: rotate(-45deg);
            width: 90px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .heart-btn::before, .heart-btn::after {
            content: "";
            background-color: #d63384;
            border-radius: 50%;
            height: 90px;
            position: absolute;
            width: 90px;
        }

        .heart-btn::before { top: -45px; left: 0; }
        .heart-btn::after { left: 45px; top: 0; }

        .heart-btn span {
            display: block;
            transform: rotate(45deg);
            position: relative;
            z-index: 5;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            width: 100%;
            top: 5px;
        }

        .heart-btn:hover { transform: rotate(-45deg) scale(1.1); }

        #videoOverlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column;
        }

        iframe { width: 90%; max-width: 800px; height: 50vh; border-radius: 15px; border: none; }
        .close-btn { margin-top: 20px; color: white; cursor: pointer; text-decoration: underline; }

        .fish { position: absolute; font-size: 2.5rem; animation: swim linear infinite; z-index: 1; }
        @keyframes swim { from { left: -100px; } to { left: 100vw; } }
    </style>
</head>
<body>

   

    <div class="container">
        <h1>Happy Two Years!</h1>
        <p class="quote">
            My lover is mine, and I am his.  
            
            -Song of Solomon 2:16
        </p>
        
        <button class="heart-btn" onclick="openVideo()">
            <span> love you monki!! </span>
        </button>
    </div>

    <div id="videoOverlay">
        <iframe id="anniversaryVideo" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="close-btn" onclick="closeVideo()">Close Video</div>
    </div>

<script>
    // Your new video ID
    var youtubeID = "MCvqRDt_5gE"; 

    function openVideo() {
        // This converts the ID into a playable embed link
        document.getElementById('anniversaryVideo').src = "https://www.youtube.com/embed/" + youtubeID + "?autoplay=1";
        document.getElementById('videoOverlay').style.display = 'flex';
    }
    
    function closeVideo() {
        document.getElementById('videoOverlay').style.display = 'none';
        document.getElementById('anniversaryVideo').src = "";
    }
</script>

</body>
</html>
