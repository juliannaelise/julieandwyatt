<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 2 Year Anniversary</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* This is the part that adds your image */
            background-image: url('il_570xN.6744392683_8xrz.avif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            font-family: 'Georgia', serif; 
            /* Changed color to a dark blue so it's visible on the white background */
            color: #0b4f6c; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; text-align: center; overflow: hidden;
        }

        .container { 
            z-index: 10; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.7); /* Adds a soft white glow behind text */
            border-radius: 20px;
        }
        
        h1 { 
            font-size: 3rem; 
            margin-bottom: 10px; 
            color: #d63384; /* A heart-red color for the title */
        }

        .quote { 
            font-size: 1.5rem; 
            font-style: italic; 
            max-width: 600px; 
            margin: 0 auto; 
            line-height: 1.4;
        }

        .video-btn {
            margin-top: 30px; padding: 15px 30px; font-size: 1.2rem;
            background-color: #0b4f6c; color: white; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .video-btn:hover { transform: scale(1.05); }

        #videoOverlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column;
        }

        iframe { width: 90%; max-width: 800px; height: 50vh; border-radius: 15px; border: none; }

        .close-btn { margin-top: 20px; color: white; cursor: pointer; text-decoration: underline; }

        /* Moving Fish */
        .fish { position: absolute; font-size: 2.5rem; animation: swim linear infinite; z-index: 1; }
        @keyframes swim { from { left: -100px; } to { left: 100vw; } }
    </style>
</head>
<body>

    <div class="fish" style="top: 10%; animation-duration: 12s;">🐟</div>
    <div class="fish" style="top: 40%; animation-duration: 15s; animation-delay: 5s;">🐠</div>
    <div class="fish" style="top: 85%; animation-duration: 20s; animation-delay: 2s;">🐡</div>

    <div class="container">
        <h1>Happy Two Years!</h1>
        <p class="quote">
            "There's a million fish in the sea, but I'm glad since we met, 
            it feels like it's just you and me."
        </p>
        <button class="video-btn" onclick="openVideo()">Click for a Surprise 🎥</button>
        <p style="margin-top: 20px; font-size: 1.2rem; font-weight: bold;">💙 Julie & Wyatt 💙</p>
    </div>

    <div id="videoOverlay">
        <iframe id="anniversaryVideo" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="close-btn" onclick="closeVideo()">Close Video</div>
    </div>

    <script>
        var youtubeID = "tQHZ-0IAeHI"; 

        function openVideo() {
            document.getElementById('anniversaryVideo').src = "https://www.youtube.com/embed/" + youtubeID + "?autoplay=1";
            document.getElementById('videoOverlay').style.display = 'flex';
        }
        function closeVideo() {
            document.getElementById('videoOverlay').style.display = 'none';
            document.getElementById('anniversaryVideo').src = "";
        }
    </script>

</body>
</html>
