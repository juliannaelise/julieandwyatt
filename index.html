<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 2 Year Anniversary</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            font-family: 'Georgia', serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* The River Waves */
        .river {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 20px,
                rgba(255, 255, 255, 0.05) 20px,
                rgba(255, 255, 255, 0.05) 40px
            );
        }

        .container {
            z-index: 10;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .quote {
            font-size: 1.8rem;
            font-style: italic;
            max-width: 600px;
            line-height: 1.4;
        }

        /* Moving Fish */
        .fish {
            position: absolute;
            font-size: 2rem;
            user-select: none;
            animation: swim linear infinite;
        }

        @keyframes swim {
            from { left: -100px; }
            to { left: 100vw; }
        }
    </style>
</head>
<body>

    <div class="river"></div>

    <div class="fish" style="top: 20%; animation-duration: 10s;">🐟</div>
    <div class="fish" style="top: 70%; animation-duration: 15s; animation-delay: 2s;">🐠</div>
    <div class="fish" style="top: 40%; animation-duration: 12s; animation-delay: 5s;">🐟</div>
    <div class="fish" style="top: 85%; animation-duration: 18s;">🐡</div>

    <div class="container">
        <h1>Happy Two Years!</h1>
        <p class="quote">
            "There's a million fish in the sea, but I'm glad since we met, 
            it feels like it's just you and me."
        </p>
        <p style="font-size: 1.5rem; margin-top: 20px;">💙 Julie & Wyatt 💙</p>
    </div>

</body>
</html>
